<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master - Gerenciador de Tarefas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Task Master</h1>
            <p id="headerSubtitle">Organize suas tarefas com estilo</p>
        </div>

        <div class="main-card">
            <!-- Auth Sections -->
            <div id="loginSection" class="auth-section active">
                <div class="auth-header">
                    <h2>Login</h2>
                    <p>Bem-vindo de volta!</p>
                </div>
                <div id="loginError" class="error-message"></div>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group password-group">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" placeholder="Sua senha" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>
                <div class="auth-footer">
                    Não tem conta? <a onclick="switchToRegister()">Cadastre-se</a>
                </div>
            </div>

            <div id="registerSection" class="auth-section">
                <div class="auth-header">
                    <h2>Cadastro</h2>
                    <p>Crie sua conta agora</p>
                </div>
                <div id="registerError" class="error-message"></div>
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Nome</label>
                        <input type="text" id="registerName" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group password-group">
                        <label for="registerPassword">Senha</label>
                        <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="form-group password-group">
                        <label for="registerConfirm">Confirmar Senha</label>
                        <input type="password" id="registerConfirm" placeholder="Confirme sua senha" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('registerConfirm')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-user-plus"></i> Criar Conta
                    </button>
                </form>
                <div class="auth-footer">
                    Já tem conta? <a onclick="switchToLogin()">Faça login</a>
                </div>
            </div>

            <!-- Dashboard Section -->
            <div id="dashboardSection" class="auth-section">
                <div class="dashboard-header">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <div>
                            <div class="user-name" id="userName">Usuário</div>
                            <small style="color: var(--text-light);">Gerenciador de Tarefas</small>
                        </div>
                    </div>
                    <button class="btn-logout" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>

                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Adicione uma nova tarefa..." />
                    <select id="prioritySelect">
                        <option value="low">Baixa</option>
                        <option value="medium" selected>Média</option>
                        <option value="high">Alta</option>
                    </select>
                    <button class="btn-add" onclick="addTask()">
                        <i class="fas fa-plus"></i> Adicionar
                    </button>
                </div>

                <div class="filters">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter(event)">Todas</button>
                    <button class="filter-btn" data-filter="pending" onclick="setFilter(event)">Pendentes</button>
                    <button class="filter-btn" data-filter="completed" onclick="setFilter(event)">Concluídas</button>
                    <button class="filter-btn" data-filter="high" onclick="setFilter(event)">Prioritárias</button>
                </div>

                <div class="tasks-list" id="tasksList">
                    <div class="empty-state">
                        <i class="fas fa-tasks"></i>
                        <p>Nenhuma tarefa ainda. Comece agora!</p>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-number" id="totalTasks">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="completedTasks">0</div>
                        <div class="stat-label">Concluídas</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="pendingTasks">0</div>
                        <div class="stat-label">Pendentes</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
